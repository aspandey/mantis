name: CI/CD Pipeline for Python Flask App

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up QEMU
        # Required for multi-platform builds on x86-64 runners
        uses: docker/setup-qemu-action@v3
        with:
          platforms: all

      - name: Set up Docker Buildx
        # Initializes the Buildx builder for multi-platform builds
        uses: docker/setup-buildx-action@v3
        
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run simple Test
        run: |
          python -m unittest mantis_test.py
          echo "Tests passed successfully!"

      - name: Build and Push Docker Image
        run: docker build . --platform linux/arm64 -t ${{ secrets.DOCKER_HUB_USER }}/mantis:latest
      - name: Login to Docker Hub
        run: docker login -u ${{ secrets.DOCKER_HUB_USER }} -p ${{ secrets.DOCKER_HUB_TOKEN }}
      - name: push image
        run: docker push ${{ secrets.DOCKER_HUB_USER }}/mantis:latest
  
